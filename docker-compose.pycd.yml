services:
  #######################################
  # MariaDB server
  #######################################
  mariadb:
#    build:
#      context: docker/mariadb/
#      dockerfile: MariaDB-11.8.3.Dockerfile
#    image: pc_mariadb
    image: mariadb:11.8.3  # Use official image directly
    container_name: pc_mariadb
    ports:
      - "3306:3306"
    restart: unless-stopped
    volumes:
      - mariadb:/var/lib/mysql
      # - mariadb-data:/var/lib/mysql
      - ./etc/mariadb/z999-docker2.cnf:/etc/mysql/conf.d/z999-docker.cnf  # Temporarily disabled
      - ./backup:/storage
    env_file:
      - etc/environment.yml
    environment:
      MARIADB_ROOT_PASSWORD: "root"
      MARIADB_AUTO_UPGRADE: "1"
      TZ: "Asia/Jakarta"
    mem_limit: 1g
    networks:
      default:
        ipv4_address: 172.18.0.52

  mongodb:
    image: "mongo:7.0.14-jammy"
    container_name: pc_mongodb
    volumes:
      - mongodb:/data/db
    ports:
      - "27017:27017"
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
    mem_limit: 400m
    networks:
      default:
        ipv4_address: 172.18.0.55

  #######################################
  # PostgreSQL
  #######################################
  postgres:
    image: postgres:16
    container_name: pc_postgres
    ports:
      - "5432:5432"
    restart: unless-stopped
    volumes:
      - postgres:/var/lib/postgresql/data
      - ./etc/postgresql/init:/docker-entrypoint-initdb.d:ro
    environment:
      POSTGRES_PASSWORD: "root"
      TZ: "Asia/Jakarta"
    mem_limit: 400m
    networks:
      default:
        ipv4_address: 172.18.0.56

  #######################################
  # Temporal Server (1.29.4)
  #######################################
  temporal:
    image: temporalio/auto-setup:1.29.4
    container_name: pc_temporal
    restart: unless-stopped
    ports:
      - "7233:7233"
      - "6933:6933"
      - "6934:6934"
      - "6935:6935"
      - "6936:6936"
      - "6939:6939"
      - "9090:9090"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_SEEDS=pc_postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PWD=root
      - DBNAME=temporal
      - VISIBILITY_DBNAME=temporal_visibility
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
      - ENABLE_ES=false
      - LOG_LEVEL=info
      - TZ=Asia/Jakarta
    volumes:
      - ./etc/temporal/dynamic.yaml:/etc/temporal/config/dynamicconfig/development-sql.yaml:ro
    depends_on:
      postgres:
        condition: service_started
    mem_limit: 1g
    networks:
      default:
        ipv4_address: 172.18.0.54
    healthcheck:
      test: ["CMD-SHELL", "temporal operator cluster health --address $$(hostname -i | awk '{print $$1}'):7233 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5

  #######################################
  # Temporal UI
  #######################################
  temporal-ui:
    image: temporalio/ui:2.47.2
    container_name: pc_temporal_ui
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000,http://localhost:8080,http://localhost:8081
      - TZ=Asia/Jakarta
    depends_on:
      - temporal
    mem_limit: 512m
    networks:
      default:
        ipv4_address: 172.18.0.53
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  #######################################
  # Redis
  #######################################
  redis:
    image: redis:alpine
    container_name: pc_redis
    networks:
      default:
        ipv4_address: 172.18.0.254
    ports:
      - "6379:6379"
    volumes:
      - redis:/data
    mem_limit: 200m
    restart: unless-stopped
    environment:
      VIRTUAL_HOST: "redis.pc.vm"
      VIRTUAL_PORT: "80"

  #######################################
  # RabbitMQ
  #######################################
  rabbit:
    image: rabbitmq:3.13.0-management
    container_name: pc_rabbit
    hostname: pc_rabbit
    networks:
      default:
        ipv4_address: 172.18.0.253
    ports:
      - "5672:5672"
      - "15672:15672"
    mem_limit: 300m
    restart: unless-stopped
    volumes:
      - ./etc/rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins
      - rabbitmq-homedir:/var/lib/rabbitmq
    environment:
      RABBITMQ_ERLANG_COOKIE: "RABBITCOOKIE"
      RABBITMQ_NODENAME: "rabbit@pc_rabbit"
      RABBITMQ_DEFAULT_USER: "dev"
      RABBITMQ_DEFAULT_PASS: "secret"
      VIRTUAL_HOST: "rabbit.pc.vm"
      VIRTUAL_PORT: "15672"

  #######################################
  # KrakenD
  #######################################
  krakend:
    image: devopsfaith/krakend:2.7.2-watch
    # image: devopsfaith/krakend:2.7.2
    # build:
    #   context: docker/krakend/
    #   dockerfile: Krakend-2.7.2.Dockerfile
    container_name: pc_krakend
    ports:
      - "80:8000"
      - "8080:8080"
    expose:
      - "8000"
      - "8080"
    environment:
      VIRTUAL_HOST: "api.paycloud.vm"
      VIRTUAL_PORT: "8000"
      KRAKEND_CONFIG: "./krakend.json"
      FC_ENABLE: 1
      FC_SETTINGS: "/etc/krakend/config/settings"
      # FC_PARTIALS: "./partials"
      FC_TEMPLATES: "/etc/krakend/config/templates"
      FC_OUT: "krakend.json"
    command: ["run","-dc","config/krakend.tmpl"]
    mem_limit: 500m
    network_mode: host
    volumes:
      - ./:/docker/
      - /Users/natan/Projects/_htdocs_pc/paycloud-apigateway:/etc/krakend
    extra_hosts:
      - "paycloud-be-createordersnap-manager:127.0.0.1"
      - "paycloud-be-qoinhubinterface-manager:127.0.0.1"

