#######################################
# Volumes
#######################################
volumes:
  mariadb:
    driver: local
    driver_opts:
      type: bind
      device: /Users/natan/lxc/mariadb_pc/db
      o: bind
  mariadb-data:
    driver: local
  mongodb:
    driver: local
    driver_opts:
      type: bind
      device: /Users/natan/lxc/mongodata_pc
      o: bind
  gosrc:
    driver: local
    driver_opts:
      type: bind
      device: /Users/natan/go/src
      o: bind
  gopkg:
    driver: local
    driver_opts:
      type: bind
      device: /Users/natan/go/pkg
      o: bind
  rabbitmq-homedir:
    driver: local
    driver_opts:
      type: bind
      device: /Users/natan/lxc/rabbitmq-homedir
      o: bind
  redis:
    driver: local
    driver_opts:
      type: bind
      device: /Users/natan/lxc/redis
      o: bind
  postgres:
    driver: local
    driver_opts:
      type: bind
      device: /Users/natan/lxc/postgres
      o: bind
  temporal:
    driver: local
    driver_opts:
      type: bind
      device: /Users/natan/lxc/temporal
      o: bind

networks:
  default:
    name: dev
    external: true
